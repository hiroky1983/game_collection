name: GameCollection
options:
  bundleIdPrefix: com.hirockysan1983.asobiba
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  GameKit:
    path: Packages/GameKit
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: 11.0.0

targets:
  GameCollection:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App
    resources:
      - App/PrivacyInfo.xcprivacy
      - App/Assets.xcassets
    dependencies:
      - package: GameKit
        product: Core
      - package: GameKit
        product: Game2048
      - package: GameKit
        product: GameShogi
      - package: GameKit
        product: GameGomoku
      - package: GameKit
        product: GameMinesweeper
      - package: GameKit
        product: GameOthello
      - package: GameKit
        product: GamePoker
      - package: GameKit
        product: GameConcentration
      - package: GameKit
        product: GameBlackjack
      - package: GoogleMobileAds
        product: GoogleMobileAds
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: あそびば
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        GADApplicationIdentifier: ca-app-pub-1869410932032409~4823987816
        NSUserTrackingUsageDescription: より関連性の高い広告を表示するために使用します。
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hirockysan1983.asobiba
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "4"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: WLUV6S77T5
        CODE_SIGN_STYLE: Automatic
