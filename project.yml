name: GameCollection
options:
  bundleIdPrefix: com.example.gamecollection
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  GameKit:
    path: Packages/GameKit

targets:
  GameCollection:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App
    dependencies:
      - package: GameKit
        product: Core
      - package: GameKit
        product: Game2048
      - package: GameKit
        product: GameShogi
      - package: GameKit
        product: GameGomoku
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Asobiba
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.gamecollection
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
